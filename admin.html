<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consola de Administración · Hamburguesas A Tu Estilo 🔥👑</title>
  
  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ===== RESET & SYSTEMS ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --fire: #ff4500;
      --ember: #ff7300;
      --gold: #f0c242;
      --charcoal: #0a0908;
      --smoke: #12100e;
      --ash: #1e1b18;
      --line: rgba(255, 255, 255, 0.05);
      --lava-border: rgba(255, 69, 0, 0.12);
      --cream: #fbf9f6;
      --muted: rgba(251, 249, 246, 0.5);
      --green: #25d366;
      --blue: #3b82f6;
      --red: #ef4444;
      --orange: #f97316;
    }
    
    body {
      background-color: var(--charcoal);
      color: var(--cream);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
      padding: 40px;
    }
    
    /* Noise Background Texture */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: .5;
    }

    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px; border-bottom: 1px solid var(--lava-border);
      padding-bottom: 24px;
    }
    
    .logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .08em;
      display: flex; align-items: center; gap: 12px;
    }
    .logo em { color: var(--fire); font-style: normal; }
    
    .status-indicator {
      display: flex; align-items: center; gap: 8px; font-size: 0.8rem;
      background: rgba(37, 211, 102, 0.08); border: 1px solid var(--green);
      padding: 6px 14px; border-radius: 20px; color: var(--green);
      font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.1em; text-transform: uppercase;
    }
    
    .live-pulse {
      width: 8px; height: 8px; background: var(--green); border-radius: 50%;
      animation: pulseLive 1.5s infinite alternate;
    }
    @keyframes pulseLive { from { transform:scale(1); opacity: .4; } to { transform:scale(1.4); opacity: 1; } }

    /* ===== STATS DASHBOARD ===== */
    .dashboard-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: var(--smoke); border: 1px solid var(--line); border-radius: 6px;
      padding: 24px; display: flex; flex-direction: column; gap: 6px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); border-color: rgba(255, 69, 0, 0.25); }
    
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
    }
    
    .stat-value {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 0.04em;
      color: var(--cream);
    }
    
    .stat-value.glow-gold { color: var(--gold); }
    .stat-value.glow-fire { color: var(--fire); }
    .stat-value.glow-green { color: var(--green); }

    /* ===== MAIN LAYOUT PARTS ===== */
    .admin-layout {
      display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px;
    }
    
    h3 {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.05em;
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--line); padding-bottom: 10px;
    }

    /* ===== ORDERS LIST PANEL ===== */
    .orders-panel {
      background: var(--smoke); border: 1px solid var(--line); border-radius: 6px;
      padding: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    
    .orders-list {
      display: flex; flex-direction: column; gap: 16px;
      max-height: 700px; overflow-y: auto; padding-right: 8px;
    }
    
    .order-card {
      background: var(--ash); border: 1px solid var(--line); border-radius: 6px;
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
      transition: all 0.2s; position: relative;
    }
    
    .order-card:hover { border-color: rgba(255, 255, 255, 0.1); }
    
    .order-card.status-Pendiente { border-left: 4px solid var(--orange); }
    .order-card.status-Parrilla { border-left: 4px solid var(--fire); }
    .order-card.status-Delivery { border-left: 4px solid var(--blue); }
    .order-card.status-Entregado { border-left: 4px solid var(--green); }
    
    .order-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .ticket-num {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.03em;
      color: var(--gold);
    }
    
    .order-time { font-size: 0.75rem; color: var(--muted); }
    
    .client-info {
      font-size: 0.9rem; line-height: 1.5;
    }
    .client-info strong { color: var(--cream); }
    
    .order-items-detail {
      background: rgba(0,0,0,0.2); border-radius: 4px; padding: 12px 16px;
      font-size: 0.82rem; display: flex; flex-direction: column; gap: 6px;
    }
    
    .item-row {
      display: flex; justify-content: space-between;
    }
    .item-notes {
      font-size: 0.72rem; color: var(--muted); margin-left: 10px; font-style: italic;
    }
    
    .order-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 6px;
    }
    
    .order-total-price {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--gold);
    }
    
    .status-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 4px;
    }
    .status-badge.badge-Pendiente { background: rgba(249, 115, 22, 0.15); color: var(--orange); }
    .status-badge.badge-Parrilla { background: rgba(255, 69, 0, 0.15); color: var(--fire); }
    .status-badge.badge-Delivery { background: rgba(59, 130, 246, 0.15); color: var(--blue); }
    .status-badge.badge-Entregado { background: rgba(37, 211, 102, 0.15); color: var(--green); }
    
    .action-row {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;
    }
    
    .action-btn {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 12px; border-radius: 4px;
      transition: var(--transition-smooth); background: var(--smoke); border: 1px solid var(--line);
    }
    .action-btn:hover { background: var(--line); transform: translateY(-1px); }
    
    .btn-to-parrilla:hover { border-color: var(--fire); color: var(--fire); }
    .btn-to-delivery:hover { border-color: var(--blue); color: var(--blue); }
    .btn-to-done:hover { border-color: var(--green); color: var(--green); }
    .btn-to-delete:hover { border-color: var(--red); color: var(--red); }
    
    .no-orders {
      text-align: center; color: var(--muted); padding: 50px 20px; font-size: 0.95rem;
    }

    /* ===== MENU STOCK CONTROLLER PANEL ===== */
    .stock-panel {
      background: var(--smoke); border: 1px solid var(--line); border-radius: 6px;
      padding: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      height: fit-content;
    }
    
    .stock-list {
      display: flex; flex-direction: column; gap: 16px;
    }
    
    .stock-item {
      display: grid; grid-template-columns: 44px 1fr auto; gap: 14px;
      align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line);
    }
    .stock-item:last-child { border-bottom: none; }
    
    .stock-item-img {
      width: 44px; height: 44px; border-radius: 4px; background: var(--ash);
      display: flex; align-items: center; justify-content: center;
      object-fit: contain; font-size: 1.2rem;
    }
    
    .stock-item-name {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: 0.05em; color: var(--cream);
    }
    
    .price-input-wrapper {
      display: flex; align-items: center; gap: 4px; margin-top: 4px;
    }
    
    .price-edit-input {
      background: var(--ash); border: 1px solid var(--line); border-radius: 4px;
      color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem;
      padding: 2px 6px; width: 80px; text-align: center;
    }
    .price-edit-input:focus { border-color: var(--fire); outline: none; }
    
    /* Toggle switch styles */
    .switch {
      position: relative; display: inline-block; width: 44px; height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background-color: var(--ash); transition: .3s; border-radius: 34px;
      border: 1px solid var(--line);
    }
    .slider::before {
      position: absolute; content: ""; height: 14px; width: 14px;
      left: 3px; bottom: 3px; background-color: var(--muted);
      transition: .3s; border-radius: 50%;
    }
    
    input:checked + .slider { background-color: var(--fire); }
    input:checked + .slider::before {
      transform: translateX(22px); background-color: #fff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--fire); border-radius: 3px; }

    @media (max-width: 1024px) {
      .admin-layout { grid-template-columns: 1fr; }
      .dashboard-grid { grid-template-columns: 1fr 1fr; }
      body { padding: 20px; }
    }
    
    @media (max-width: 600px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 14px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">HAMBURGUESAS <em>A TU ESTILO</em> · Panel Admin 👑</div>
    <div class="status-indicator">
      <div class="live-pulse"></div>
      Consola Sincronizada en Vivo
    </div>
  </header>

  <!-- METRICS CARDS -->
  <section class="dashboard-grid">
    <div class="stat-card">
      <span class="stat-label">Ventas Totales</span>
      <span class="stat-value glow-gold" id="statSales">$0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Pedidos en Fuego (Parrilla)</span>
      <span class="stat-value glow-fire" id="statParrilla">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">En Delivery (Viaje)</span>
      <span class="stat-value" style="color:var(--blue);" id="statDelivery">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Pedidos Completados</span>
      <span class="stat-value glow-green" id="statCompleted">0</span>
    </div>
  </section>

  <!-- MAIN DUAL GRID PANELS -->
  <main class="admin-layout">
    
    <!-- LEFT PANEL: INCOMING ORDERS -->
    <section class="orders-panel">
      <h3>🔥 Pedidos Entrantes</h3>
      <div class="orders-list" id="adminOrdersList">
        <!-- Rendered dynamically -->
      </div>
    </section>

    <!-- RIGHT PANEL: STOCK AND PRICES MANAGEMENT -->
    <section class="stock-panel">
      <h3>🍔 Control de Stock & Precios</h3>
      <div class="stock-list" id="adminStockList">
        <!-- Rendered dynamically -->
      </div>
    </section>
    
  </main>

  <script>
    // ===== DATA MOCK TO CORRESPOND TO CLIENT =====
    const menuItems = [
      { id: 1, name: 'La Capitana', emoji: '🍔', price: 7500, image: 'assets/capitana.png' },
      { id: 2, name: 'La Oscura', emoji: '🖤', price: 7000, image: 'assets/oscura.png' },
      { id: 3, name: 'BBQ Bacon Craft', emoji: '🥓', price: 7800, image: 'assets/bbq_bacon.png' },
      { id: 4, name: 'La Infernal', emoji: '🌶️', price: 7200, image: 'assets/infernal.png' },
      { id: 5, name: 'Papas Rústicas', emoji: '🍟', price: 2800, image: 'assets/papas_clasicas.png' },
      { id: 6, name: 'Papas Cheddar & Bacon', emoji: '🧀', price: 3600, image: 'assets/papas_cheddar.png' },
      { id: 7, name: 'Limonada de Menta', emoji: '🍋', price: 1800, image: 'assets/limonada.png' },
      { id: 8, name: 'Combo Full Craft', emoji: '🍔🍟🥤', price: 10500, image: 'assets/combo_gourmet.png' },
      { id: 9, name: 'Combo Dúo Brutal', emoji: '🍔🍔🍟', price: 16000, image: 'assets/capitana.png' }
    ];

    // ===== COMPILING AND RENDERING STATE =====
    function loadAdminData() {
      renderOrders();
      renderStockList();
      calculateMetrics();
    }

    // ===== METRICS ENGINE =====
    function calculateMetrics() {
      const orders = JSON.parse(localStorage.getItem('adminOrders') || '[]');
      
      const salesTotal = orders
        .filter(o => o.status === 'Entregado')
        .reduce((sum, o) => sum + o.total, 0);
        
      const activeParrilla = orders.filter(o => o.status === 'Parrilla').length;
      const activeDelivery = orders.filter(o => o.status === 'Delivery').length;
      const completedCount = orders.filter(o => o.status === 'Entregado').length;
      
      document.getElementById('statSales').textContent = '$' + salesTotal.toLocaleString('es-AR');
      document.getElementById('statParrilla').textContent = activeParrilla;
      document.getElementById('statDelivery').textContent = activeDelivery;
      document.getElementById('statCompleted').textContent = completedCount;
    }

    // ===== ORDER RENDERING =====
    function renderOrders() {
      const ordersList = document.getElementById('adminOrdersList');
      const orders = JSON.parse(localStorage.getItem('adminOrders') || '[]');
      
      if (orders.length === 0) {
        ordersList.innerHTML = `
          <div class="no-orders">
            🛎️ Aún no han ingresado pedidos de clientes.<br>
            <span style="font-size:0.8rem; color:var(--muted)">¡Simulá una compra abriendo index.html en otra pestaña!</span>
          </div>
        `;
        return;
      }
      
      ordersList.innerHTML = orders.map((order, index) => {
        // Buttons depending on status
        let buttonsHtml = '';
        if (order.status === 'Pendiente') {
          buttonsHtml = `
            <button class="action-btn btn-to-parrilla" onclick="updateOrderStatus(${index}, 'Parrilla')">👨‍🍳 A la Parrilla</button>
            <button class="action-btn btn-to-delete" onclick="deleteOrder(${index})">✕ Cancelar</button>
          `;
        } else if (order.status === 'Parrilla') {
          buttonsHtml = `
            <button class="action-btn btn-to-delivery" onclick="updateOrderStatus(${index}, 'Delivery')">🛵 Enviar Delivery</button>
            <button class="action-btn btn-to-delete" onclick="deleteOrder(${index})">✕ Cancelar</button>
          `;
        } else if (order.status === 'Delivery') {
          buttonsHtml = `
            <button class="action-btn btn-to-done" onclick="updateOrderStatus(${index}, 'Entregado')">🟢 Marcar Entregado</button>
          `;
        } else if (order.status === 'Entregado') {
          buttonsHtml = `
            <span style="font-size:0.75rem; color:var(--green); font-weight:bold;">📦 Pedido entregado y cerrado</span>
            <button class="action-btn btn-to-delete" style="margin-left:auto;" onclick="deleteOrder(${index})">Eliminar Registro</button>
          `;
        }
        
        return `
          <div class="order-card status-${order.status}">
            <div class="order-header">
              <span class="ticket-num">TICKET #${order.ticket}</span>
              <span class="order-time">${order.date}</span>
            </div>
            
            <div class="client-info">
              <strong>Cliente:</strong> ${order.name}<br>
              <strong>Método:</strong> ${order.method}
              ${order.address !== 'N/A' ? `<br><strong>Dirección:</strong> ${order.address}` : ''}<br>
              <strong>Pago:</strong> ${order.payment}<br>
              <strong>Notas:</strong> <span style="color:var(--gold); font-style:italic;">"${order.notes}"</span>
            </div>
            
            <div class="order-items-detail">
              ${order.items.map(item => `
                <div>
                  <div class="item-row">
                    <strong>${item.qty}x ${item.name}</strong>
                    <span>$${(item.price * item.qty).toLocaleString('es-AR')}</span>
                  </div>
                  ${item.notes && item.notes.length ? `<div class="item-notes">* ${item.notes.join(', ')}</div>` : ''}
                </div>
              `).join('')}
            </div>
            
            <div class="order-footer">
              <span class="status-badge badge-${order.status}">${order.status}</span>
              <span class="order-total-price">Total: $${order.total.toLocaleString('es-AR')}</span>
            </div>
            
            <div class="action-row">
              ${buttonsHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function updateOrderStatus(index, newStatus) {
      const orders = JSON.parse(localStorage.getItem('adminOrders') || '[]');
      if (orders[index]) {
        orders[index].status = newStatus;
        localStorage.setItem('adminOrders', JSON.stringify(orders));
        
        // Trigger sync with client
        localStorage.setItem('hamburgesas_estilo_status_sync', Date.now());
        
        loadAdminData();
      }
    }

    function deleteOrder(index) {
      if (confirm("¿Estás seguro de eliminar este registro de pedido?")) {
        const orders = JSON.parse(localStorage.getItem('adminOrders') || '[]');
        orders.splice(index, 1);
        localStorage.setItem('adminOrders', JSON.stringify(orders));
        loadAdminData();
      }
    }

    // ===== STOCK & PRICES MANAGEMENT =====
    function renderStockList() {
      const stockEl = document.getElementById('adminStockList');
      const outOfStockList = JSON.parse(localStorage.getItem('outOfStockProducts') || '[]');
      const priceChanges = JSON.parse(localStorage.getItem('adminPriceChanges') || '{}');
      
      stockEl.innerHTML = menuItems.map(item => {
        const isOutOfStock = outOfStockList.includes(item.id);
        const actualPrice = priceChanges[item.id] !== undefined ? priceChanges[item.id] : item.price;
        
        return `
          <div class="stock-item">
            <div class="stock-item-img">
              <img src="${item.image}" alt="${item.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><text y=\'.9em\' font-size=\'90\'>🍔</text></svg>';" style="width:100%;height:100%;object-fit:contain;">
            </div>
            
            <div>
              <div class="stock-item-name">${item.name}</div>
              <div class="price-input-wrapper">
                <span style="font-size:0.75rem; color:var(--muted)">Precio: $</span>
                <input type="number" class="price-edit-input" value="${actualPrice}" onchange="updateProductPrice(${item.id}, this.value)">
              </div>
            </div>
            
            <div>
              <label class="switch">
                <input type="checkbox" ${!isOutOfStock ? 'checked' : ''} onchange="toggleProductStock(${item.id}, this.checked)">
                <span class="slider"></span>
              </label>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleProductStock(id, isAvailable) {
      let outOfStockList = JSON.parse(localStorage.getItem('outOfStockProducts') || '[]');
      
      if (isAvailable) {
        // Remove from out-of-stock list
        outOfStockList = outOfStockList.filter(x => x !== id);
      } else {
        // Add to out-of-stock list
        if (!outOfStockList.includes(id)) {
          outOfStockList.push(id);
        }
      }
      
      localStorage.setItem('outOfStockProducts', JSON.stringify(outOfStockList));
      loadAdminData();
    }

    function updateProductPrice(id, newPrice) {
      const priceVal = parseFloat(newPrice);
      if (isNaN(priceVal) || priceVal <= 0) return;
      
      const priceChanges = JSON.parse(localStorage.getItem('adminPriceChanges') || '{}');
      priceChanges[id] = priceVal;
      localStorage.setItem('adminPriceChanges', JSON.stringify(priceChanges));
      
      loadAdminData();
    }

    // ===== 10. REAL-TIME STORAGE COMMUNICATION SYNC =====
    window.addEventListener('storage', (e) => {
      // If a client sends a new order in another tab, this tab receives trigger and updates list!
      if (e.key === 'hamburgesas_estilo_new_order_trigger') {
        loadAdminData();
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', loadAdminData);
  </script>
</body>
</html>
